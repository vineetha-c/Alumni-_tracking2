{% extends 'core/base.html' %}
{% block title %}Login | Alumni Connect{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="form-card">
            <h1>Login</h1>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <small class="error">{{ field.errors|striptags }}</small>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
