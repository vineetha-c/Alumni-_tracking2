{% extends 'core/base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="form-card">
            <h1>Change Password</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn">Update Password</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
